- title: "Self-Supervised and Transfer Learning for Geohazard Mapping"
  image_path: "images/projects/ssl-lsm-workflow.jpg"
  description: "Exploring patch-based self-supervised learning, transfer learning, and few-shot adaptation for small-sample landslide susceptibility mapping. This research investigates whether pre-trained representations from geospatial conditioning factors can improve model generalization under limited labeled data."
