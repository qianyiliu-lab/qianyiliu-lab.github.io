- title: "Self-Supervised Learning for Small-Sample Landslide Susceptibility Mapping"
  status: "Ongoing / Under preparation"
  image_path: "images/projects/ssl-lsm-workflow.jpg"
  summary: "This project investigates whether self-supervised representation learning can improve small-sample landslide susceptibility mapping. It uses dual-view geospatial patches, ResNet-style CNNs, masked reconstruction, contrastive learning, and few-shot fine-tuning for spatial transfer evaluation."
  methods: "PyTorch, ResNet-18, dual-view patches, masked reconstruction, contrastive learning, fine-tuning, few-shot learning."
